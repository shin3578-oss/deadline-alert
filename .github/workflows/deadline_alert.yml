name: やることリスト 期限アラート

on:
  workflow_dispatch:        # Cron-job.org から GitHub API 経由で起動（毎週月曜 8:09 JST）
    inputs:
      alert_days:
        description: '何日以内をアラート対象にするか（省略時は7日）'
        required: false
        default: '7'

jobs:
  run-alert:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 必要パッケージをインストール
        run: pip install -r requirements.txt

      - name: 期限アラートを実行
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          LW_PRIVATE_KEY:          ${{ secrets.LW_PRIVATE_KEY }}
          LW_TARGET:               ${{ secrets.LW_TARGET }}
          LW_TARGET_TYPE:          ${{ secrets.LW_TARGET_TYPE }}
          ALERT_DAYS:              ${{ github.event.inputs.alert_days || '3' }}
        run: python main.py
